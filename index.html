<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRFA League</title>
<style>
html {
    scroll-behavior: smooth;
}

body {
    background: #f1f5f9;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

#title {
    padding-bottom: 20px;
    padding-top: 10px;
}

/* ------------------ CONTAINER & TABLE ------------------ */
.container {
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* remove height: 100vh; */
}

h1 {
    margin-bottom: 20px;
    text-align: center;
}

/* Table wrapper allows horizontal scrolling */
.table-wrapper {
    width: 100%;
    overflow-x: auto;
    flex: 1; /* table takes most of the screen */
}

table {
    width: 100%;
    min-width: 1200px; /* make table wider horizontally */
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
}

th, td {
    padding: 25px;
    text-align: center;
    white-space: nowrap;
}

th {
    background: #e2e8f0;
    font-weight: bold;
    font-size: 16px;
}

tr:nth-child(even) {
    background: #f8fafc;
}

/* Club column */
.club {
    text-align: left;
}

.club img {
    width: 35px;
    margin-right: 8px;
    vertical-align: middle;
}

/* Team links */
.club a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}

.club a:hover {
    color: #2563eb;
}

/* Form colors */
.form span {
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 12px;
    margin: 2px;
}
.win { background: #22c55e; color: white; }
.draw { background: #facc15; }
.loss { background: #ef4444; color: white; }
.tbd { background: gray; color: white; }

/* ------------------ MATCHUP MODAL ------------------ */
#matchupModal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal-content {
    background: #ffffff;
    border-radius: 20px;
    padding: 40px;
    width: 900px;
    max-width: 95%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.card {
    background: #ffffff;
    border-radius: 20px;
    padding: 30px;
    width: 300px;
    text-align: center;
}

.team-name {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 25px;
}

.content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
}

.player {
    background: #f8fafc;
    border-radius: 15px;
    padding: 15px;
    flex: 1;
}

.stat {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #2563eb;
}

.player-name {
    font-size: 14px;
    color: #64748b;
}

.team-logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
}

.team-logo img {
    width: 100px;
}

.vs {
    font-size: 24px;
    font-weight: bold;
}

/* Close button */
.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 28px;
    font-weight: bold;
    color: white;
    cursor: pointer;
}

/* Form legend under the table */
.form-legend {
    margin-top: 10px;
    font-size: 18px;
    color: #475569;
    text-align: center;
    font-weight: bold;
}
.form-legend span {
    display: inline-block;
    width: 18px;
    height: 18px;
    line-height: 18px;
    text-align: center;
    border-radius: 4px;
    margin-right: 5px;
    font-size: 12px;
    vertical-align: middle;
}

</style>
</head>
<body>

<div class="container">
    <h1  id="title">JRFA League Table</h1>
    <h2>MATCHWEEK 1/8</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th class="club">Club</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>Pts</th>
                    <th>Form</th>
                </tr>
            </thead>
            <tbody id="leagueTable">
                <!-- Teams will be generated here from JS for easier editing -->
            </tbody>
        </table>
    </div>
</div>

<div class="form-legend">
    <span class="win">W</span> = Win &nbsp;&nbsp;
    <span class="draw">D</span> = Draw &nbsp;&nbsp;
    <span class="loss">L</span> = Loss
    <span class="tbd">?</span> = Match Unplayed
</div>

<!-- ------------------ MATCHUP MODAL ------------------ -->
<div id="matchupModal">
    <div class="close-btn" onclick="closeMatchup()">&times;</div>
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ------------------ TEAM DATA ------------------
// Each team has: name, logo, points, W/D/L, form, matchup (next opponent)
const teams = [
    {
        id: 'team1',
        name: 'TEAM 1',
        logo: 'logotemplate.webp',
        played: 0,
        wins: 0,
        draws: 0,
        losses: 0,
        points: 0,
        form: ['?','?','?','?','?'],
        nextMatch: 'team2',  
        cardPlayers: { player1: "SEB", player2: "LUCAS"}
    },
    {
        id: 'team2',
        name: 'NORTHERN TEKKERS',
        logo: 'tekkers.png',
        played: 0,
        wins: 0,
        draws: 0,
        losses: 0,
        points: 0,
        form: ['?','?','?','?','?'],
        nextMatch: 'team1',
        cardPlayers: { player1: "MAX", player2: "JACK" }
    },
    {
        id: 'team3',
        name: 'TEAM 3',
        logo: 'logotemplate.webp',
        played: 0,
        wins: 0,
        draws: 0,
        losses: 0,
        points: 0,
        form: ['?','?','?','?','?'],
        nextMatch: 'team4',
        cardPlayers: { player1: "ELLIOT", player2: "KAITO" }
    },
    {
        id: 'team4',
        name: 'TEAM 4',
        logo: 'logotemplate.webp',
        played: 0,
        wins: 0,
        draws: 0,
        losses: 0,
        points: 0,
        form: ['?','?','?','?','?'],
        nextMatch: 'team3',
        cardPlayers: { player1: "JAYDEN", player2: "RORY" }
    }

    
];

// ------------------ GENERATE TABLE ------------------
const tableBody = document.getElementById('leagueTable');

teams.forEach(team => {
    const row = document.createElement('tr');
    row.innerHTML = `
        <td>${teams.indexOf(team)+1}</td>
        <td class="club">
            <a href="#" onclick="openMatchup('${team.id}')">
                <img src="${team.logo}"> ${team.name}
            </a>
        </td>
        <td>${team.played}</td>
        <td>${team.wins}</td>
        <td>${team.draws}</td>
        <td>${team.losses}</td>
        <td>${team.points}</td>
        <td class="form">
            ${team.form.map(f => {
                if(f==='W') return `<span class="win">${f}</span>`;
                if(f==='D') return `<span class="draw">${f}</span>`;
                if(f==='?') return `<span class="tbd">${f}</span>`;
                return `<span class="loss">${f}</span>`;
            }).join('')}
        </td>
    `;
    tableBody.appendChild(row);
});

// ------------------ MATCHUP MODAL ------------------
function openMatchup(teamId){
    const modal = document.getElementById('matchupModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = '';

    // Get the clicked team
    const team = teams.find(t => t.id === teamId);
    // Get next opponent team
    const opponent = teams.find(t => t.id === team.nextMatch);

function createCard(t){
    return `
        <div class="card">
            <div class="team-name">${t.name}</div>
            <div class="content">
                <div class="player">
                    <div class="player-name">${t.cardPlayers.player1}</div>
                </div>
                <div class="team-logo"><img src="${t.logo}"></div>
                <div class="player">
                    <div class="player-name">${t.cardPlayers.player2}</div>
                </div>
            </div>
        </div>
    `;
}

    content.innerHTML = createCard(team) + `<div class="vs">VS</div>` + createCard(opponent);
    modal.style.display = 'flex';
}

// Close modal functions
function closeMatchup(){
    document.getElementById('matchupModal').style.display = 'none';
}

document.getElementById('matchupModal').addEventListener('click', function(e){
    if(e.target.id === 'matchupModal'){
        closeMatchup();
    }
});

document.addEventListener('keydown', function(e){
    if(e.key === "Escape"){
        closeMatchup();
    }
});
</script>

</body>
</html>
